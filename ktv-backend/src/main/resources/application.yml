server:
  port: 8080

spring:
  application:
    name: ktv-backend

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ktv?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  # 文件上传配置（深度审查修复：500MB→100MB，降低DoS风险）
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 200MB

# 媒体文件基础路径配置
media:
  base-path: D:/ktv-media

# 跨域配置（S9修复：支持通过环境变量动态配置，生产环境通过 CORS_ALLOWED_ORIGINS 设置）
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

# JWT配置（生产环境请通过环境变量 JWT_SECRET 注入，不要硬编码）
jwt:
  secret: ${JWT_SECRET:ktv-local-dev-secret-key-2026-must-be-at-least-32-chars}
  expiration: 7200000

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

# 日志配置
logging:
  level:
    com.ktv: debug
    org.springframework.web: info
