server:
  port: 8080

spring:
  application:
    name: ktv-backend

  # 数据源配置
  # M5/M6/M14修复：使用环境变量注入敏感配置，避免硬编码
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/ktv_db?useUnicode=true&characterEncoding=utf8&useSSL=${DB_USE_SSL:false}&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=${DB_ALLOW_PUBLIC_KEY:true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:Qq123456}

  # Redis配置
  # M7/M9修复：Redis密码使用环境变量，连接池max-wait设置合理超时
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: 3000ms  # M9修复：从-1ms改为3000ms，避免无限等待导致线程饥饿
          max-idle: 8
          min-idle: 0

  # 文件上传配置（深度审查修复：500MB→100MB，降低DoS风险）
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 200MB

# 媒体文件基础路径配置
# M8修复：支持Windows和Linux路径，通过环境变量配置
media:
  base-path: ${MEDIA_BASE_PATH:/data/ktv-media}

# 跨域配置（S9修复：支持通过环境变量动态配置，生产环境通过 CORS_ALLOWED_ORIGINS 设置）
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

# JWT配置（生产环境请通过环境变量 JWT_SECRET 注入，不要硬编码）
jwt:
  secret: ${JWT_SECRET:ktv-local-dev-secret-key-2026-must-be-at-least-32-chars}
  expiration: 7200000

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    # M17修复：生产环境应关闭SQL日志输出，避免暴露敏感数据
    log-impl: ${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.stdout.StdOutImpl}
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

# 日志配置
# L4修复：增加日志文件输出配置，避免容器重启后日志丢失
logging:
  level:
    com.ktv: debug
    org.springframework.web: info
  file:
    name: logs/ktv-backend.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30
      total-size-cap: 3GB
